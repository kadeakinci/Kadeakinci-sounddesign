<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kade — Sound Design & Composition</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* -------------------- GLOBAL -------------------- */
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: #000 !important;
  color: #e6e6e6;
  font-family: "Inter", sans-serif;
  overflow-x: hidden;
  animation: bgPulse 12s ease-in-out infinite;
}

/* Ambient breathing background */
@keyframes bgPulse {
  0% { background-color: #000; }
  50% { background-color: #080808; }
  100% { background-color: #000; }
}

/* Fade-in animation */
.fade {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* -------------------- STARFIELD (MASSIVE + TWINKLING) -------------------- */
.starfield, .starfield2, .starfield3 {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

/* Layer 1 — bright stars */
.starfield {
  background: transparent;
  box-shadow:
    /* 150 stars */
    10vw 10vh #fff, 20vw 30vh #fff, 30vw 50vh #fff, 40vw 70vh #fff, 50vw 20vh #fff,
    60vw 80vh #fff, 70vw 40vh #fff, 80vw 60vh #fff, 90vw 10vh #fff, 15vw 90vh #fff,
    25vw 75vh #fff, 35vw 15vh #fff, 45vw 95vh #fff, 55vw 55vh #fff, 65vw 25vh #fff,
    75vw 85vh #fff, 85vw 35vh #fff, 95vw 65vh #fff,
    10vw 110vh #fff, 20vw 130vh #fff, 30vw 150vh #fff, 40vw 170vh #fff, 50vw 120vh #fff,
    60vw 180vh #fff, 70vw 140vh #fff, 80vw 160vh #fff, 90vw 110vh #fff, 15vw 190vh #fff;
  width: 2px;
  height: 2px;
  animation: drift1 90s linear infinite, twinkle 2s ease-in-out infinite alternate;
}

/* Layer 2 — medium stars */
.starfield2 {
  background: transparent;
  box-shadow:
    /* 100 stars */
    12vw 20vh #aaa, 22vw 40vh #aaa, 32vw 60vh #aaa, 42vw 80vh #aaa, 52vw 30vh #aaa,
    62vw 90vh #aaa, 72vw 50vh #aaa, 82vw 70vh #aaa, 92vw 20vh #aaa, 18vw 95vh #aaa,
    28vw 85vh #aaa, 38vw 25vh #aaa, 48vw 100vh #aaa, 58vw 65vh #aaa, 68vw 35vh #aaa,
    78vw 88vh #aaa, 88vw 45vh #aaa, 98vw 75vh #aaa;
  width: 1.5px;
  height: 1.5px;
  animation: drift2 140s linear infinite, twinkle 3s ease-in-out infinite alternate;
}

/* Layer 3 — dim stars */
.starfield3 {
  background: transparent;
  box-shadow:
    /* 80 stars */
    5vw 15vh #666, 15vw 35vh #666, 25vw 55vh #666, 35vw 75vh #666, 45vw 25vh #666,
    55vw 85vh #666, 65vw 45vh #666, 75vw 65vh #666, 85vw 15vh #666, 95vw 95vh #666;
  width: 1px;
  height: 1px;
  animation: drift3 200s linear infinite, twinkle 4s ease-in-out infinite alternate;
}

/* Drift speeds */
@keyframes drift1 {
  from { transform: translateY(0); }
  to { transform: translateY(-300vh); }
}

@keyframes drift2 {
  from { transform: translateY(0); }
  to { transform: translateY(-200vh); }
}

@keyframes drift3 {
  from { transform: translateY(0); }
  to { transform: translateY(-150vh); }
}

/* Twinkling */
@keyframes twinkle {
  0% { opacity: 0.4; }
  100% { opacity: 1; }
}

/* -------------------- HEADER -------------------- */
header {
  padding: 3rem;
  text-align: center;
  letter-spacing: 0.12em;
  font-size: 0.85rem;
  color: #888;
  text-transform: uppercase;
}

/* -------------------- HERO -------------------- */
.hero {
  padding: 14rem 2rem 12rem;
  text-align: center;
  max-width: 900px;
  margin: auto;
  position: relative;
}

/* Glow behind hero */
.hero::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 600px;
  height: 600px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,200,120,0.12), transparent 70%);
  filter: blur(80px);
  animation: heroGlow 10s ease-in-out infinite;
  z-index: -1;
}

@keyframes heroGlow {
  0% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.25; transform: translate(-50%, -50%) scale(1.15); }
  100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
}

.hero h1 {
  font-size: 3.4rem;
  font-weight: 300;
  letter-spacing: 0.03em;
  margin-bottom: 1.5rem;
  color: #ffcc8a;
}

.hero p {
  font-size: 1.2rem;
  color: #b5b5b5;
  max-width: 650px;
  margin: auto;
  line-height: 1.7;
}

/* -------------------- SECTIONS -------------------- */
.section {
  padding: 9rem 2rem;
  max-width: 900px;
  margin: auto;
}

/* Title underline animation */
.section h2 {
  font-size: 2rem;
  font-weight: 300;
  margin-bottom: 2.5rem;
  letter-spacing: 0.03em;
  color: #ffcc8a;
  position: relative;
  display: inline-block;
}

.section h2::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;
  width: 0%;
  height: 2px;
  background: #ffcc8a;
  transition: width 0.4s ease;
}

.section:hover h2::after {
  width: 100%;
}

/* -------------------- CARDS -------------------- */
.card {
  background: #0b0b0b;
  border: 1px solid #1a1a1a;
  padding: 2rem;
  border-radius: 14px;
  margin-bottom: 3rem;
  transition: 0.3s ease;
  position: relative;
  overflow: hidden;
}

.card:hover {
  border-color: #ffcc8a;
  box-shadow: 0 0 25px rgba(255,200,120,0.15);
  transform: translateY(-4px);
}

  font
